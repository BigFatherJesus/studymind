openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: StudyMind API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: subjects
    description: Subject management
  - name: uploads
    description: File upload pipeline
  - name: knowledge
    description: Knowledge base and nodes
  - name: chat
    description: AI chat tutor
  - name: flashcards
    description: Flashcards and quizzes
  - name: teams
    description: Teams and collaboration
  - name: users
    description: User management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /subjects:
    get:
      operationId: listSubjects
      tags: [subjects]
      summary: List all subjects for current user
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"
    post:
      operationId: createSubject
      tags: [subjects]
      summary: Create a new subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubjectRequest"
      responses:
        "201":
          description: Created subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"

  /subjects/{subjectId}:
    get:
      operationId: getSubject
      tags: [subjects]
      summary: Get a subject by ID
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
    patch:
      operationId: updateSubject
      tags: [subjects]
      summary: Update a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubjectRequest"
      responses:
        "200":
          description: Updated subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
    delete:
      operationId: deleteSubject
      tags: [subjects]
      summary: Delete a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /subjects/{subjectId}/uploads:
    get:
      operationId: listUploads
      tags: [uploads]
      summary: List uploads for a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of uploads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Upload"
    post:
      operationId: createUpload
      tags: [uploads]
      summary: Create an upload record (text/URL based)
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadRequest"
      responses:
        "201":
          description: Created upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Upload"

  /subjects/{subjectId}/uploads/{uploadId}:
    get:
      operationId: getUpload
      tags: [uploads]
      summary: Get an upload
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Upload"
    delete:
      operationId: deleteUpload
      tags: [uploads]
      summary: Delete an upload
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /subjects/{subjectId}/uploads/{uploadId}/process:
    post:
      operationId: processUpload
      tags: [uploads]
      summary: Trigger AI processing of an upload
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Processing result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingResult"

  /subjects/{subjectId}/knowledge-nodes:
    get:
      operationId: listKnowledgeNodes
      tags: [knowledge]
      summary: List knowledge nodes for a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Knowledge nodes with edges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeGraph"
    post:
      operationId: createKnowledgeNode
      tags: [knowledge]
      summary: Create a knowledge node
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeNodeRequest"
      responses:
        "201":
          description: Created node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeNode"

  /subjects/{subjectId}/knowledge-nodes/{nodeId}:
    patch:
      operationId: updateKnowledgeNode
      tags: [knowledge]
      summary: Update a knowledge node
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKnowledgeNodeRequest"
      responses:
        "200":
          description: Updated node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeNode"
    delete:
      operationId: deleteKnowledgeNode
      tags: [knowledge]
      summary: Delete a knowledge node
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /subjects/{subjectId}/knowledge-edges:
    post:
      operationId: createKnowledgeEdge
      tags: [knowledge]
      summary: Create an edge between knowledge nodes
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeEdgeRequest"
      responses:
        "201":
          description: Created edge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEdge"

  /subjects/{subjectId}/knowledge-edges/{edgeId}:
    delete:
      operationId: deleteKnowledgeEdge
      tags: [knowledge]
      summary: Delete a knowledge edge
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
        - name: edgeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /subjects/{subjectId}/flashcards:
    get:
      operationId: listFlashcards
      tags: [flashcards]
      summary: List flashcards for a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Flashcards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Flashcard"

  /subjects/{subjectId}/quizzes:
    get:
      operationId: listQuizzes
      tags: [flashcards]
      summary: List quizzes for a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quizzes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quiz"
    post:
      operationId: generateQuiz
      tags: [flashcards]
      summary: Generate a quiz for a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateQuizRequest"
      responses:
        "201":
          description: Generated quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /subjects/{subjectId}/quizzes/{quizId}/submit:
    post:
      operationId: submitQuizAnswers
      tags: [flashcards]
      summary: Submit quiz answers and get results
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
        - name: quizId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitQuizRequest"
      responses:
        "200":
          description: Quiz results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"

  /subjects/{subjectId}/chat:
    get:
      operationId: listChatMessages
      tags: [chat]
      summary: List chat messages for a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to the AI tutor
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendChatMessageRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /subjects/{subjectId}/conflicts:
    get:
      operationId: listConflicts
      tags: [knowledge]
      summary: List detected conflicts in a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conflicts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conflict"

  /subjects/{subjectId}/conflicts/{conflictId}/resolve:
    post:
      operationId: resolveConflict
      tags: [knowledge]
      summary: Resolve a conflict
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
        - name: conflictId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveConflictRequest"
      responses:
        "200":
          description: Resolved conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conflict"

  /subjects/{subjectId}/versions:
    get:
      operationId: listVersions
      tags: [subjects]
      summary: List version history for a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubjectVersion"

  /subjects/{subjectId}/versions/{versionId}/restore:
    post:
      operationId: restoreVersion
      tags: [subjects]
      summary: Restore a subject to a previous version
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Restored subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"

  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List teams for current user
      responses:
        "200":
          description: Teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Created team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{teamId}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{teamId}/members:
    get:
      operationId: listTeamMembers
      tags: [teams]
      summary: List team members
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: addTeamMember
      tags: [teams]
      summary: Add a member to a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTeamMemberRequest"
      responses:
        "201":
          description: Added member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /users/me/credits:
    get:
      operationId: getCredits
      tags: [users]
      summary: Get current user's credit balance
      responses:
        "200":
          description: Credit info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditInfo"

  /notifications:
    get:
      operationId: listNotifications
      tags: [users]
      summary: List notifications for current user
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    User:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
          nullable: true
        subscriptionTier:
          type: string
          enum: [free, entry, intermediate, advanced, professional, enterprise]
        subjectLimit:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, displayName, subscriptionTier, subjectLimit, createdAt]

    Subject:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        aiDescription:
          type: string
          nullable: true
        keyConcepts:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [initializing, active, verifying, archived]
        verificationScore:
          type: number
          nullable: true
        uploadsCount:
          type: integer
        flashcardsCount:
          type: integer
        nodeCount:
          type: integer
        teamId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, status, keyConcepts, uploadsCount, flashcardsCount, nodeCount, createdAt, updatedAt]

    CreateSubjectRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        syllabusText:
          type: string
          nullable: true
        teamId:
          type: string
          nullable: true
      required: [title]

    UpdateSubjectRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true

    Upload:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [pdf, text, url, audio, video, image, word, ppt]
        status:
          type: string
          enum: [pending, processing, completed, failed]
        content:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        fileSize:
          type: integer
          nullable: true
        processingLog:
          type: string
          nullable: true
        flashcardsGenerated:
          type: integer
        nodesGenerated:
          type: integer
        uploadedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, subjectId, title, type, status, flashcardsGenerated, nodesGenerated, uploadedBy, createdAt]

    CreateUploadRequest:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
          enum: [pdf, text, url, audio, video, image, word, ppt]
        content:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
      required: [title, type]

    ProcessingResult:
      type: object
      properties:
        uploadId:
          type: string
        summary:
          type: string
        flashcardsCreated:
          type: integer
        nodesCreated:
          type: integer
        conflictsDetected:
          type: integer
        processingLog:
          type: string
      required: [uploadId, summary, flashcardsCreated, nodesCreated, conflictsDetected, processingLog]

    KnowledgeGraph:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeEdge"
      required: [nodes, edges]

    KnowledgeNode:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        label:
          type: string
        definition:
          type: string
          nullable: true
        sourceReference:
          type: string
          nullable: true
        difficultyRating:
          type: integer
          nullable: true
        examRelevance:
          type: integer
          nullable: true
        nodeType:
          type: string
          enum: [concept, definition, formula, event, term]
        x:
          type: number
          nullable: true
        y:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, subjectId, label, nodeType, createdAt]

    CreateKnowledgeNodeRequest:
      type: object
      properties:
        label:
          type: string
        definition:
          type: string
          nullable: true
        nodeType:
          type: string
          enum: [concept, definition, formula, event, term]
        difficultyRating:
          type: integer
          nullable: true
        examRelevance:
          type: integer
          nullable: true
      required: [label, nodeType]

    UpdateKnowledgeNodeRequest:
      type: object
      properties:
        label:
          type: string
        definition:
          type: string
          nullable: true
        difficultyRating:
          type: integer
          nullable: true
        examRelevance:
          type: integer
          nullable: true
        x:
          type: number
          nullable: true
        y:
          type: number
          nullable: true

    KnowledgeEdge:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        sourceNodeId:
          type: string
        targetNodeId:
          type: string
        label:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, subjectId, sourceNodeId, targetNodeId, createdAt]

    CreateKnowledgeEdgeRequest:
      type: object
      properties:
        sourceNodeId:
          type: string
        targetNodeId:
          type: string
        label:
          type: string
          nullable: true
      required: [sourceNodeId, targetNodeId]

    Flashcard:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        front:
          type: string
        back:
          type: string
        nodeId:
          type: string
          nullable: true
        uploadId:
          type: string
          nullable: true
        difficulty:
          type: string
          enum: [easy, medium, hard]
        lastReviewed:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, subjectId, front, back, difficulty, createdAt]

    Quiz:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        title:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
        totalQuestions:
          type: integer
        completedAt:
          type: string
          format: date-time
          nullable: true
        score:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, subjectId, title, questions, totalQuestions, createdAt]

    QuizQuestion:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctIndex:
          type: integer
        explanation:
          type: string
          nullable: true
      required: [id, question, options, correctIndex]

    GenerateQuizRequest:
      type: object
      properties:
        title:
          type: string
        questionCount:
          type: integer
        uploadIds:
          type: array
          items:
            type: string
        nodeIds:
          type: array
          items:
            type: string
        difficulty:
          type: string
          enum: [easy, medium, hard, mixed]
      required: [title, questionCount, difficulty]

    SubmitQuizRequest:
      type: object
      properties:
        answers:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: string
              selectedIndex:
                type: integer
            required: [questionId, selectedIndex]
      required: [answers]

    QuizResult:
      type: object
      properties:
        quizId:
          type: string
        score:
          type: number
        totalQuestions:
          type: integer
        correctAnswers:
          type: integer
        feedback:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: string
              correct:
                type: boolean
              selectedIndex:
                type: integer
              correctIndex:
                type: integer
              explanation:
                type: string
                nullable: true
            required: [questionId, correct, selectedIndex, correctIndex]
      required: [quizId, score, totalQuestions, correctAnswers, feedback]

    ChatMessage:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        citations:
          type: array
          items:
            type: object
            properties:
              uploadId:
                type: string
              title:
                type: string
              excerpt:
                type: string
            required: [uploadId, title, excerpt]
